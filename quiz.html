<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Style Chat — BeStyle.ai</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✦</text></svg>" />
  <link rel="stylesheet" href="style.css" />
  <style>
    body { display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
    .chat-nav { position: fixed; top: 0; left: 0; right: 0; z-index: 100; background: rgba(6,6,10,0.9); backdrop-filter: blur(20px); border-bottom: 1px solid var(--glass-border); padding: 14px 0; }
    .chat-nav-inner { display: flex; align-items: center; justify-content: space-between; max-width: 760px; margin: 0 auto; padding: 0 24px; }
    .status-dot { width: 7px; height: 7px; border-radius: 50%; background: #4ade80; box-shadow: 0 0 8px rgba(74,222,128,0.6); animation: pulse-dot 2s infinite; }
    #chat-messages { flex: 1; overflow-y: auto; padding: 90px 24px 140px; display: flex; flex-direction: column; gap: 20px; max-width: 760px; width: 100%; margin: 0 auto; position: relative; z-index: 1; scrollbar-width: thin; scrollbar-color: var(--glass-border) transparent; }
    #chat-messages::-webkit-scrollbar { width: 4px; }
    #chat-messages::-webkit-scrollbar-track { background: transparent; }
    #chat-messages::-webkit-scrollbar-thumb { background: var(--glass-border); border-radius: 4px; }
    .msg-row { display: flex; gap: 12px; align-items: flex-end; animation: msgIn 0.4s var(--ease-out-expo); }
    .msg-row.user { flex-direction: row-reverse; }
    @keyframes msgIn { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
    .ai-avatar { width: 36px; height: 36px; border-radius: 50%; flex-shrink: 0; background: linear-gradient(135deg, rgba(201,149,106,0.3), rgba(201,149,106,0.1)); border: 1px solid rgba(201,149,106,0.35); display: flex; align-items: center; justify-content: center; font-size: 0.9rem; color: var(--gold); margin-bottom: 2px; }
    .msg-bubble { max-width: 72%; padding: 14px 18px; border-radius: 18px; font-size: 0.95rem; line-height: 1.75; }
    .msg-row:not(.user) .msg-bubble { background: var(--surface); border: 1px solid var(--glass-border); border-bottom-left-radius: 4px; color: var(--text); }
    .msg-row.user .msg-bubble { background: linear-gradient(135deg, rgba(201,149,106,0.18), rgba(201,149,106,0.08)); border: 1px solid rgba(201,149,106,0.25); border-bottom-right-radius: 4px; color: var(--text); }
    .typing-indicator { display: flex; align-items: center; gap: 5px; padding: 14px 18px; }
    .typing-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--gold); opacity: 0.5; animation: typingBounce 1.2s infinite; }
    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes typingBounce { 0%, 80%, 100% { transform: translateY(0); opacity: 0.4; } 40% { transform: translateY(-6px); opacity: 1; } }
    .chips-wrap { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }
    .chip { padding: 8px 18px; border-radius: 100px; border: 1px solid var(--glass-border-bright); background: var(--glass); color: var(--text-muted); font-size: 0.82rem; font-weight: 500; cursor: pointer; transition: all 0.25s var(--ease-out-expo); }
    .chip:hover { border-color: var(--gold); color: var(--gold); background: var(--gold-glow); }
    .chip.selected { border-color: var(--gold); color: #06060A; background: var(--gold); }
    .analysis-card { background: var(--glass); border: 1px solid var(--glass-border); border-radius: var(--radius-lg); padding: 28px 32px; animation: msgIn 0.5s var(--ease-out-expo); }
    .analysis-title { font-size: 0.75rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--gold); font-weight: 600; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
    .analysis-spinner { width: 14px; height: 14px; border: 1.5px solid var(--glass-border); border-top-color: var(--gold); border-radius: 50%; animation: spin 0.8s linear infinite; flex-shrink: 0; }
    .analysis-step { display: flex; align-items: center; gap: 12px; padding: 10px 0; border-bottom: 1px solid var(--glass-border); font-size: 0.88rem; color: var(--text-dim); opacity: 0; transition: opacity 0.4s, color 0.4s; }
    .analysis-step:last-child { border-bottom: none; }
    .analysis-step.active { opacity: 1; color: var(--text-muted); }
    .analysis-step.done { opacity: 1; color: var(--text); }
    .step-icon { width: 18px; height: 18px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
    .step-spinner { width: 14px; height: 14px; border: 1.5px solid var(--glass-border); border-top-color: var(--gold); border-radius: 50%; animation: spin 0.8s linear infinite; }
    .reveal-card { background: var(--glass); border: 1px solid rgba(201,149,106,0.2); border-radius: var(--radius-lg); padding: 32px; position: relative; overflow: hidden; animation: msgIn 0.6s var(--ease-out-expo); }
    .reveal-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px; background: linear-gradient(to right, transparent, var(--gold), transparent); }
    .reveal-label { font-size: 0.72rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--gold); font-weight: 600; margin-bottom: 12px; display: block; }
    .reveal-archetype { font-family: 'Playfair Display', serif; font-size: clamp(1.6rem, 4vw, 2.4rem); font-weight: 700; background: linear-gradient(135deg, var(--gold-bright), var(--gold)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; line-height: 1.2; margin-bottom: 14px; }
    .reveal-desc { font-size: 0.9rem; color: var(--text-muted); line-height: 1.8; margin-bottom: 24px; }
    .reveal-cta { display: inline-flex; align-items: center; gap: 10px; padding: 14px 28px; border-radius: 100px; background: linear-gradient(135deg, var(--gold-light), var(--gold)); color: #06060A; font-weight: 600; font-size: 0.9rem; transition: all 0.3s var(--ease-out-expo); text-decoration: none; }
    .reveal-cta:hover { transform: translateY(-2px) scale(1.02); box-shadow: 0 8px 32px var(--gold-glow-md); }
    #input-area { position: fixed; bottom: 0; left: 0; right: 0; z-index: 100; background: rgba(6,6,10,0.92); backdrop-filter: blur(20px); border-top: 1px solid var(--glass-border); padding: 16px 24px 20px; }
    .input-inner { max-width: 760px; margin: 0 auto; display: flex; align-items: flex-end; gap: 10px; }
    #user-input { flex: 1; background: var(--surface); border: 1px solid var(--glass-border); border-radius: 16px; padding: 12px 18px; color: var(--text); font-size: 0.95rem; font-family: 'Inter', sans-serif; outline: none; resize: none; max-height: 120px; line-height: 1.6; transition: border-color 0.2s, box-shadow 0.2s; }
    #user-input::placeholder { color: var(--text-dim); }
    #user-input:focus { border-color: rgba(201,149,106,0.4); box-shadow: 0 0 0 3px var(--gold-glow); }
    #send-btn { width: 44px; height: 44px; border-radius: 12px; flex-shrink: 0; background: linear-gradient(135deg, var(--gold-light), var(--gold)); color: #06060A; display: flex; align-items: center; justify-content: center; transition: all 0.25s var(--ease-out-expo); opacity: 0.35; pointer-events: none; }
    #send-btn.active { opacity: 1; pointer-events: auto; cursor: pointer; }
    #send-btn.active:hover { transform: scale(1.08); box-shadow: 0 4px 16px var(--gold-glow-md); }
    .input-hint { font-size: 0.72rem; color: var(--text-dim); text-align: center; margin-top: 10px; }
  </style>
</head>
<body>
<div style="position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;">
  <div style="position:absolute;width:500px;height:500px;border-radius:50%;filter:blur(100px);background:radial-gradient(circle,rgba(201,149,106,0.07) 0%,transparent 70%);top:-150px;right:-100px;"></div>
  <div style="position:absolute;width:400px;height:400px;border-radius:50%;filter:blur(100px);background:radial-gradient(circle,rgba(201,149,106,0.05) 0%,transparent 70%);bottom:-100px;left:-80px;"></div>
</div>
<nav class="chat-nav">
  <div class="chat-nav-inner">
    <a href="/" style="font-family:'Playfair Display',serif;font-size:1.1rem;font-weight:700;color:var(--text);">BeStyle<span style="color:var(--gold)">.ai</span></a>
    <div style="display:flex;align-items:center;gap:8px;font-size:0.8rem;color:var(--text-muted);"><div class="status-dot"></div> AI Stylist — Online</div>
    <a href="/" class="btn btn-ghost" style="padding:8px 18px;font-size:0.8rem;">← Home</a>
  </div>
</nav>
<div id="chat-messages"></div>
<div id="input-area">
  <div class="input-inner">
    <textarea id="user-input" rows="1" placeholder="Type your answer…" disabled></textarea>
    <button id="send-btn" onclick="sendMessage()" aria-label="Send"><svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg></button>
  </div>
  <p class="input-hint">BeStyle.ai · Your answers stay private</p>
</div>
<script>
const QUESTIONS=[
  "Hi — I'm BeStyle, your personal AI stylist. ✦\n\nI'll ask you a few questions to build your unique style profile. There are no wrong answers — just be honest.\n\nTo start: how would you describe your style right now?",
  "Got it. Now tell me — how do you *want* to dress? What's the feeling or image you're chasing?",
  "What occasions do you mostly dress for — work, weekends, social events, travel, or a mix?",
  "Which colours do you find yourself reaching for most?",
  "BUDGET_CHIPS",
  "Last one — name someone whose style you admire, or describe a vibe, a place, a mood you want when you get dressed."
];
const BUDGET_OPTIONS=["Under AED 100","AED 100–200","AED 200–500","AED 500–1,000","AED 1,000+"];
const ANALYSIS_STEPS=["Reading your style signals","Identifying your archetype","Curating your colour palette","Designing your outfit formulas","Writing your personal style rules","Finalising your profile"];
const ANSWER_KEYS=['identity','aspiration','occasions','colors','budget','vibe'];
const FALLBACK={styleArchetype:'The Quiet Minimalist',archetype_description:"You move through the world with intention. Your style is a study in restraint — carefully chosen pieces that speak quietly but say everything. Every item you own earns its place.",colorPalette:['#F5F0EB','#C9956A','#2C2C2C','#8B7355','#E8E0D5'],colorNames:['Warm Ivory','Cognac','Charcoal','Camel','Pale Linen'],outfits:[{name:'The Monday Meeting',occasion:'Office',pieces:['Tailored camel blazer','Ivory silk shirt','Wide-leg charcoal trousers','Leather loafers in cognac'],tip:'Let the blazer do the work.'},{name:'The Weekend Edit',occasion:'Casual',pieces:['Oversized linen shirt','Dark slim jeans','White leather sneakers','Minimal tote'],tip:'Tuck half-in for polish.'},{name:'The Evening Look',occasion:'Social',pieces:['Camel slip dress','Black blazer','Pointed-toe heels','Gold jewellery'],tip:'One statement piece only.'}],styleRules:['Invest in fit above all else.','Build around three core neutrals.','One statement per outfit.','Quality over quantity.','Comfort is non-negotiable.'],shoppingTips:['Invest first in outerwear.','Buy trousers in person.','Avoid trend-only pieces.','Shop your wardrobe first.']};
let step=0,answers={},inputLocked=false,profileData=null;
const startTime=Date.now();
const messagesEl=document.getElementById('chat-messages');
const inputEl=document.getElementById('user-input');
const sendBtn=document.getElementById('send-btn');
function scrollBottom(){setTimeout(()=>messagesEl.scrollTo({top:messagesEl.scrollHeight,behavior:'smooth'}),60);}
function enableInput(){inputEl.disabled=false;inputEl.focus();inputLocked=false;}
function lockInput(){inputEl.disabled=true;sendBtn.classList.remove('active');inputLocked=true;}
function appendTyping(){const r=document.createElement('div');r.className='msg-row';r.id='typing-row';r.innerHTML='<div class="ai-avatar">✦</div><div class="msg-bubble" style="padding:0;"><div class="typing-indicator"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div></div>';messagesEl.appendChild(r);scrollBottom();}
function removeTyping(){const r=document.getElementById('typing-row');if(r)r.remove();}
function appendAIMessage(text){removeTyping();const r=document.createElement('div');r.className='msg-row';const html=text.replace(/\n/g,'<br>').replace(/\*(.*?)\*/g,'<em>$1</em>');r.innerHTML='<div class="ai-avatar">✦</div><div class="msg-bubble">'+html+'</div>';messagesEl.appendChild(r);scrollBottom();}
function appendUserMessage(text){const r=document.createElement('div');r.className='msg-row user';r.innerHTML='<div class="msg-bubble">'+text+'</div>';messagesEl.appendChild(r);scrollBottom();}
function appendChips(){removeTyping();const row=document.createElement('div');row.className='msg-row';const inner=document.createElement('div');inner.style.cssText='display:flex;flex-direction:column;gap:8px;max-width:72%;';const bubble=document.createElement('div');bubble.className='msg-bubble';bubble.textContent="What's your rough budget per complete outfit?";const wrap=document.createElement('div');wrap.className='chips-wrap';BUDGET_OPTIONS.forEach(opt=>{const chip=document.createElement('button');chip.className='chip';chip.textContent=opt;chip.onclick=()=>{if(inputLocked)return;wrap.querySelectorAll('.chip').forEach(c=>{c.disabled=true;c.style.opacity='0.4';c.style.pointerEvents='none';});chip.classList.add('selected');chip.style.opacity='1';answers.budget=opt;appendUserMessage(opt);lockInput();step++;setTimeout(askNext,700);};wrap.appendChild(chip);});inner.appendChild(bubble);inner.appendChild(wrap);row.innerHTML='<div class="ai-avatar">✦</div>';row.appendChild(inner);messagesEl.appendChild(row);scrollBottom();}
function askNext(){if(step>=QUESTIONS.length){startAnalysis();return;}lockInput();appendTyping();setTimeout(()=>{if(QUESTIONS[step]==='BUDGET_CHIPS'){appendChips();}else{appendAIMessage(QUESTIONS[step]);enableInput();}},step===0?800:1200);}
function sendMessage(){const text=inputEl.value.trim();if(!text||inputLocked)return;appendUserMessage(text);answers[ANSWER_KEYS[step]]=text;inputEl.value='';inputEl.style.height='auto';sendBtn.classList.remove('active');lockInput();step++;setTimeout(askNext,600);}
function startAnalysis(){
  fetch('/api/recommend',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({answers})})
  .then(r=>r.ok?r.json():Promise.reject()).then(d=>{profileData=d&&!d.error?d:null;}).catch(()=>{profileData=null;})
  .finally(()=>{const elapsed=Date.now()-startTime;const minWait=ANALYSIS_STEPS.length*1100+1200;const remaining=Math.max(0,minWait-elapsed);setTimeout(showReveal,remaining);});
  const card=document.createElement('div');card.className='analysis-card';
  let stepsHTML='';ANALYSIS_STEPS.forEach((s,i)=>{stepsHTML+='<div class="analysis-step" id="as'+i+'"><div class="step-icon" id="si'+i+'"><span style="color:var(--text-dim);font-size:1rem;">·</span></div><span>'+s+'</span></div>';});
  card.innerHTML='<div class="analysis-title"><div class="analysis-spinner"></div>BeStyle AI is building your profile</div>'+stepsHTML;
  messagesEl.appendChild(card);scrollBottom();
  let i=0;
  function tick(){if(i>0){const prev=document.getElementById('as'+(i-1));if(prev){prev.classList.add('done');document.getElementById('si'+(i-1)).innerHTML='<span style="color:var(--gold)">✓</span>';}}
    if(i<ANALYSIS_STEPS.length){const cur=document.getElementById('as'+i);if(cur){cur.classList.add('active');document.getElementById('si'+i).innerHTML='<div class="step-spinner"></div>';}i++;setTimeout(tick,1100);}}
  tick();
}
function showReveal(){const data=profileData||FALLBACK;sessionStorage.setItem('bestyle_profile',JSON.stringify(data));sessionStorage.setItem('bestyle_answers',JSON.stringify(answers));const last=document.getElementById('as'+(ANALYSIS_STEPS.length-1));if(last){last.classList.add('done');document.getElementById('si'+(ANALYSIS_STEPS.length-1)).innerHTML='<span style="color:var(--gold)">✓</span>';}setTimeout(()=>{const reveal=document.createElement('div');reveal.className='reveal-card';const swatches=(data.colorPalette||[]).slice(0,4).map((hex,i)=>'<div title="'+((data.colorNames||[])[i]||hex)+'" style="width:26px;height:26px;border-radius:50%;background:'+hex+';border:2px solid rgba(255,255,255,0.1);"></div>').join('');const desc=(data.archetype_description||'').substring(0,220);reveal.innerHTML='<span class="reveal-label">Your Style Archetype</span><div class="reveal-archetype">'+(data.styleArchetype||'The Refined Individual')+'</div><p class="reveal-desc">'+desc+(desc.length>=220?'…':'')+'</p>'+(swatches?'<div style="display:flex;gap:8px;align-items:center;margin-bottom:24px;">'+swatches+'<span style="font-size:0.75rem;color:var(--text-dim);margin-left:6px;">Your palette</span></div>':'')+'<a href="results.html" class="reveal-cta">View Full Style Profile <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg></a>';messagesEl.appendChild(reveal);scrollBottom();},600);}
inputEl.addEventListener('input',()=>{inputEl.style.height='auto';inputEl.style.height=Math.min(inputEl.scrollHeight,120)+'px';sendBtn.classList.toggle('active',inputEl.value.trim().length>0);});
inputEl.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();if(!inputLocked&&inputEl.value.trim())sendMessage();}});
window.addEventListener('load',()=>setTimeout(askNext,500));
</script>
</body>
</html>
